<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Подарки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600&display=swap');

  :root {
    --bg: #0d0d12;
    --card: #15151e;
    --card2: #1c1c28;
    --accent: #c084fc;
    --accent2: #f472b6;
    --gold: #fbbf24;
    --text: #f1f0ff;
    --muted: #6b6b8a;
    --border: rgba(192,132,252,0.15);
    --glow: rgba(192,132,252,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG noise */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    padding: 16px 20px 12px;
    background: linear-gradient(180deg, var(--bg) 60%, transparent);
    backdrop-filter: blur(12px);
  }

  .header-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .header-sub {
    font-size: 12px; color: var(--muted);
    margin-top: 2px; font-weight: 500;
  }

  /* RECIPIENT INPUT */
  .recipient-block {
    margin: 8px 16px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    position: relative;
  }

  .recipient-label {
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 8px;
  }

  .recipient-input-wrap {
    display: flex; gap: 8px; align-items: center;
  }

  .recipient-input {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 15px; font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
  }
  .recipient-input::placeholder { color: var(--muted); }
  .recipient-input:focus { border-color: var(--accent); }

  .recipient-hint {
    font-size: 11px; color: var(--muted);
    margin-top: 8px; line-height: 1.4;
  }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px;
    padding: 14px 16px 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Manrope', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent; color: #fff;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 10px 16px 100px;
    position: relative; z-index: 1;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 14px 14px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(192,132,252,0.08), transparent);
    opacity: 0; transition: opacity 0.2s;
  }

  .card:active {
    transform: scale(0.94);
    border-color: var(--accent);
  }
  .card:active::before { opacity: 1; }

  .card.selected {
    border-color: var(--accent);
    background: var(--card2);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 32px var(--glow);
  }
  .card.selected::before { opacity: 1; }

  .card-check {
    position: absolute; top: 10px; right: 10px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 11px;
  }
  .card.selected .card-check { opacity: 1; transform: scale(1); }

  .card-emoji {
    font-size: 42px;
    margin-bottom: 10px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    transition: transform 0.2s;
    line-height: 1;
  }
  .card:active .card-emoji { transform: scale(1.15) rotate(-5deg); }

  .card-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px; font-weight: 600;
    text-align: center;
    color: var(--text);
    letter-spacing: -0.2px;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card-price {
    display: flex; align-items: center; gap: 4px;
    background: var(--card2);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 13px; font-weight: 700;
    color: var(--gold);
    border: 1px solid rgba(251,191,36,0.2);
  }

  .star-icon { font-size: 12px; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(0deg, var(--bg) 70%, transparent);
    z-index: 200;
  }

  .buy-btn {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 8px 32px rgba(192,132,252,0.4);
    letter-spacing: -0.3px;
  }

  .buy-btn:active { transform: scale(0.97); }
  .buy-btn:disabled {
    background: var(--card2);
    color: var(--muted);
    box-shadow: none;
    cursor: default;
  }

  .buy-btn-price {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 12px;
  }

  /* EMPTY STATE */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* TOAST */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🎁 Gift Shop</div>
  <div class="header-sub">Выбери подарок и получателя</div>
</div>

<div class="recipient-block">
  <div class="recipient-label">Получатель</div>
  <div class="recipient-input-wrap">
    <input class="recipient-input" id="recipientInput"
      type="text" placeholder="@username или ID"
      autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="recipient-hint">Введи @username или числовой ID пользователя</div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-price="all">Все</button>
  <button class="filter-btn" data-price="15">15 ⭐</button>
  <button class="filter-btn" data-price="25">25 ⭐</button>
  <button class="filter-btn" data-price="50">50 ⭐</button>
  <button class="filter-btn" data-price="100">100 ⭐</button>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-bar">
  <button class="buy-btn" id="buyBtn" disabled>
    <span id="buyBtnText">Выбери подарок</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const GIFTS = [
  { name: 'Сердце',            emoji: '❤️',  price: 15  },
  { name: 'Мишка',             emoji: '🧸',  price: 15  },
  { name: 'Коробка',           emoji: '🎁',  price: 25  },
  { name: 'Роза',              emoji: '🌹',  price: 25  },
  { name: 'Медведь в шапке',   emoji: '🧸',  price: 50  },
  { name: 'Ёлка',              emoji: '🎄',  price: 50  },
  { name: 'Медведь с сердцем', emoji: '🐻',  price: 50  },
  { name: 'Сердце с бантом',   emoji: '💖',  price: 50  },
  { name: 'Торт',              emoji: '🎂',  price: 50  },
  { name: 'Букет',             emoji: '💐',  price: 50  },
  { name: 'Ракета',            emoji: '🚀',  price: 50  },
  { name: 'Шампанское',        emoji: '🍾',  price: 50  },
  { name: 'Золотая звезда',    emoji: '⭐',  price: 100 },
  { name: 'Кольцо',            emoji: '💍',  price: 100 },
  { name: 'Серебряная звезда', emoji: '🌟',  price: 100 },
];

const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0d0d12');
  tg.setBackgroundColor('#0d0d12');
}

let selected = null;
let activeFilter = 'all';

const grid = document.getElementById('grid');
const buyBtn = document.getElementById('buyBtn');
const buyBtnText = document.getElementById('buyBtnText');
const recipientInput = document.getElementById('recipientInput');

function renderGrid() {
  const filtered = activeFilter === 'all'
    ? GIFTS
    : GIFTS.filter(g => g.price === parseInt(activeFilter));

  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Нет подарков в этой категории</div>';
    return;
  }

  filtered.forEach(gift => {
    const card = document.createElement('div');
    card.className = 'card' + (selected?.name === gift.name ? ' selected' : '');
    card.innerHTML = `
      <div class="card-check">✓</div>
      <div class="card-emoji">${gift.emoji}</div>
      <div class="card-name">${gift.name}</div>
      <div class="card-price"><span class="star-icon">⭐</span>${gift.price}</div>
    `;
    card.addEventListener('click', () => selectGift(gift));
    grid.appendChild(card);
  });
}

function selectGift(gift) {
  if (selected?.name === gift.name) {
    selected = null;
  } else {
    selected = gift;
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  }
  renderGrid();
  updateBtn();
}

function updateBtn() {
  const recipient = recipientInput.value.trim();
  if (selected && recipient) {
    buyBtn.disabled = false;
    buyBtnText.innerHTML = `
      Отправить ${selected.emoji}
      <span class="buy-btn-price">⭐ ${selected.price}</span>
    `;
  } else if (selected) {
    buyBtn.disabled = true;
    buyBtnText.textContent = 'Введи получателя';
  } else {
    buyBtn.disabled = true;
    buyBtnText.textContent = 'Выбери подарок';
  }
}

function showToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function validateRecipient(val) {
  if (/^@[a-zA-Z0-9_]{5,32}$/.test(val)) return true;
  if (/^\d{5,}$/.test(val)) return true;
  return false;
}

buyBtn.addEventListener('click', () => {
  if (!selected) return;
  const recipient = recipientInput.value.trim();
  if (!validateRecipient(recipient)) {
    showToast('⚠️ Неверный формат получателя');
    recipientInput.focus();
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    return;
  }

  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

  // Отправляем данные боту
  if (tg) {
    tg.sendData(JSON.stringify({
      gift: selected.name,
      recipient: recipient,
      price: selected.price,
      emoji: selected.emoji
    }));
  } else {
    // Dev mode
    showToast(`✅ ${selected.emoji} ${selected.name} → ${recipient}`);
  }
});

recipientInput.addEventListener('input', updateBtn);

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.price;
  renderGrid();
});

renderGrid();
updateBtn();
</script>
</body>
</html>
